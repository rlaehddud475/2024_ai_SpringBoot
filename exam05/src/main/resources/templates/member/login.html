<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        layout:decorate="~{layouts/main}">
<main layout:fragment="content">
    [[${apples}]]
<form method="post" th:action="@{/member/login}" autocomplete="off" th:object="${requestLogin}">
     <dl>
         <dt th:text="#{이메일}"></dt>
         <dd><input type="text" name="email" th:field="*{email}">
         <div th:each="err : ${#fields.errors('email')}" th:text="${err}"></div>
         </dd>

     </dl>
    <dl>
        <dt th:text="#{비밀번호}"></dt>
        <dd><input type="password" name="password" th:field="*{password}"></dd>
        <div th:each="err : ${#fields.errors('password')}" th:text="${err}"></div>
    </dl>
<div>
    <input type="checkbox" name="saveEmail" value="true" id="saveEmail"><label for="saveEmail" th:text="#{이메일 기억하기}">
</label>
</div>
    <button type="submit" th:text="#{로그인}"></button>
</form>
</main>
</html>
